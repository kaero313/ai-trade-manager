name: ai-trade-manager-local

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_trade_manager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:3.5.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.local
    restart: "no"
    env_file:
      - .env.local
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      PYTHONUNBUFFERED: "1"
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: Dockerfile.local
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      OPENSEARCH_URL: http://opensearch:9200
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      opensearch:
        condition: service_started
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile.local
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    environment:
      ADMIN_BASIC_AUTH_USER: ${ADMIN_BASIC_AUTH_USER:?Set ADMIN_BASIC_AUTH_USER in .env.local}
      ADMIN_BASIC_AUTH_HASH: ${ADMIN_BASIC_AUTH_HASH:?Set ADMIN_BASIC_AUTH_HASH in .env.local}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"

volumes:
  postgres_data:
  opensearch_data:
